<!DOCTYPE html>
<html>
<head>
    <title>Hash 路由方案</title>
</head>
<body>
    <nav>
        <a href="#/" data-link>首页</a>
        <a href="#/hello" data-link>Hello</a>
        <a href="#/bed" data-link>Bed</a>
        <a href="#/about" data-link>About</a>
    </nav>

    <div id="content"></div>

    <script>
        class HashRouter {
            constructor() {
                this.routes = {
                    '/': () => this.render('<h1>首页</h1>'),
                    '/hello': () => this.render('<h1>Hello</h1><p>Hello页面内容</p>'),
                    '/bed': () => this.render('<h1>Bed</h1><p>Bed页面内容</p>'),
                    '/about': () => this.render('<h1>About</h1><p>关于页面</p>')
                };

                this.init();
            }

            init() {
                window.addEventListener('hashchange', () => {
                    this.onHashChange();
                });

                this.onHashChange();
            }

            onHashChange() {
                const hash = window.location.hash.substring(1) || '/';
                const handler = this.routes[hash] || this.routes['/'];
                handler();
            }

            render(content) {
                document.getElementById('content').innerHTML = content;
            }

            navigate(path) {
                window.location.hash = path;
            }
        }

        const router = new HashRouter();

        document.addEventListener('click', (e) => {
            if (e.target.matches('[data-link]')) {
                e.preventDefault();
                router.navigate(e.target.getAttribute('href').substring(1));
            }
        });
    </script>
</body>
</html>
