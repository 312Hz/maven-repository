<!DOCTYPE html>
<html>
<head>
    <title>增强版 JS 路由</title>
    <style>
        .page { display: none; padding: 20px; }
        .active { display: block; }
    </style>
</head>
<body>
    <nav>
        <button onclick="router.navigate('/')">首页</button>
        <button onclick="router.navigate('/hello')">Hello</button>
        <button onclick="router.navigate('/bed')">Bed</button>
        <button onclick="router.navigate('/about')">About</button>
    </nav>

    <div id="content">
    </div>

    <script>
        const router = {
            routes: {
                '/': () => '<h1>首页</h1><p>欢迎来到首页</p>',
                '/hello': () => '<h1>Hello 页面</h1><p>这是 Hello 页面内容</p>',
                '/bed': () => '<h1>Bed 页面</h1><p>这是 Bed 页面内容</p>',
                '/about': () => '<h1>About 页面</h1><p>关于我们</p>'
            },

            init() {
                this.checkDirectAccess();
                
                window.addEventListener('popstate', () => {
                    this.render(window.location.pathname);
                });

                this.render(window.location.pathname);
            },

            navigate(path) {
                history.pushState({}, '', path);
                this.render(path);
            },

            render(path) {
                const content = document.getElementById('content');
                const routeHandler = this.routes[path] || this.routes['*'];
                
                if (routeHandler) {
                    content.innerHTML = routeHandler();
                } else {
                    content.innerHTML = '<h1>404</h1><p>页面未找到</p>';
                }
            },

            checkDirectAccess() {
                const path = window.location.pathname;
                if (path !== '/' && !this.routes[path]) {
                    sessionStorage.setItem('targetRoute', path);
                    window.location.href = '/';
                }
            },

            restoreRoute() {
                const targetRoute = sessionStorage.getItem('targetRoute');
                if (targetRoute) {
                    sessionStorage.removeItem('targetRoute');
                    this.navigate(targetRoute);
                }
            }
        };

        router.init();

        window.addEventListener('load', () => {
            if (window.location.pathname === '/') {
                router.restoreRoute();
            }
        });
    </script>
</body>
</html>
